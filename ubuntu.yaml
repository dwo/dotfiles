- name: Ubuntu
  become: yes
  hosts: localhost
  connection: local
  vars_prompt:
  - name: "user"
    prompt: "Enter the username to configure"
    private: no

  tasks:
  - ansible.builtin.package_facts: manager=apt

  - name: Repository prerequisites
    ansible.builtin.apt:
      install_recommends: no
      update_cache: yes
      name:
      - ca-certificates
      - curl
      - gnupg

  - name: NodeSource keyring directory
    ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: "0755"

  - name: NodeSource signing key
    ansible.builtin.get_url:
      url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
      dest: /etc/apt/keyrings/nodesource.asc
      mode: "0644"
    register: nodesource_key

  - name: NodeSource repository
    ansible.builtin.apt_repository:
      repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_22.x nodistro main"
      filename: nodesource
      update_cache: no
    register: nodesource_repo

  - name: Repositories
    ansible.builtin.apt_repository:
      repo: "{{ item }}"
      update_cache: no
    register: repositories
    with_items:
    - ppa:neovim-ppa/unstable

  - name: Packages
    ansible.builtin.apt:
      install_recommends: no
      update_cache: "{{ nodesource_key.changed or nodesource_repo.changed or repositories.changed }}"
      name:
      - fish
      - graphviz
      - neovim
      - nodejs
      - pipx
      - python3-venv
      - screen
      - shellcheck
      - xclip

  - name: Configure Shell
    ansible.builtin.user:
      name: "{{ user }}"
      shell: /usr/bin/fish
      state: present

  - name: Install starship
    ansible.builtin.shell:
      creates: /usr/local/bin/starship
      cmd: curl -sS https://starship.rs/install.sh | sh -s -- -y

  - name: Install uv
    become_user: "{{ user }}"
    ansible.builtin.command:
      creates: "/home/{{ user }}/.local/bin/uv"
      cmd: pipx install uv
    environment:
      PIPX_BIN_DIR: "/home/{{ user }}/.local/bin"
      PIPX_HOME: "/home/{{ user }}/.local/share/pipx"
